name: Notify Telegram on Release

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest

    env:
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHATS: ${{ secrets.TG_CHATS }}
      RELEASE_NAME: ${{ github.event.release.name || github.event.repository.name }}
      RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
      RELEASE_URL: ${{ github.event.release.html_url || format('{0}/{1}/releases/latest', github.server_url, github.repository) }}

    steps:
      - name: Send Telegram notifications
        env:
          ASSET_URL1: ${{ github.event.release.assets && github.event.release.assets[0] && github.event.release.assets[0].browser_download_url || '' }}
          ASSET_URL2: ${{ github.event.release.assets && github.event.release.assets[1] && github.event.release.assets[1].browser_download_url || '' }}
        run: |
          # Construim textul cu newline-uri reale (Telegram HTML nu acceptă <br>)
          TEXT="$(printf '%s\n' \
            '📢 <b>TuxPulse are o nouă versiune pe GitHub!</b>' \
            "<b>${RELEASE_NAME}</b> (tag: <code>${RELEASE_TAG}</code>)" \
            "" \
            "👉 Un set de instrumente rapid pentru Linux, scris în Python, care include comenzi de administrare utile și ajustări pentru optimizarea și curățarea sistemului." \
            "Cod gratuit și curat, fără spyware, malware sau reclame." \
            "" \
            "👉 <a href=\"${RELEASE_URL}\">Mergi la pagina noii versiuni</a>" \
          )"
          
          # Adăugăm link-urile de descărcare doar dacă există
          if [ -n "$ASSET_URL1" ]; then
            TEXT+=$'\n'"⬇️ <a href=\"${ASSET_URL1}\">Descarcă fișierul de instalare</a>"
          fi
          
          if [ -n "$ASSET_URL2" ]; then
            TEXT+=$'\n'"⬇️ <a href=\"${ASSET_URL2}\">Descarcă fișierul portabil</a>"
          fi

          IFS=',' read -r -a CHAT_ARRAY <<< "${TG_CHATS}"

          echo "TG_CHATS raw: >${TG_CHATS}<"

          for ITEM in "${CHAT_ARRAY[@]}"; do
            ITEM_TRIM=$(echo "$ITEM" | xargs)
            [ -z "$ITEM_TRIM" ] && continue

            if [[ "$ITEM_TRIM" == *":"* ]]; then
              CHAT_ID="${ITEM_TRIM%%:*}"
              THREAD_ID="${ITEM_TRIM##*:}"
              curl -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
                -d chat_id="${CHAT_ID}" \
                -d message_thread_id="${THREAD_ID}" \
                -d parse_mode="HTML" \
                --data-urlencode "text=${TEXT}"
            else
              CHAT_ID="$ITEM_TRIM"
              curl -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
                -d chat_id="${CHAT_ID}" \
                -d parse_mode="HTML" \
                --data-urlencode "text=${TEXT}"
            fi
          done





